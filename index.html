<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語 Flashcards - Estudo de Japonês</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered:', registration);

                    // Check for updates
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateToast(newWorker);
                            }
                        });
                    });

                    // If there's already a waiting worker, show toast
                    if (registration.waiting) {
                        showUpdateToast(registration.waiting);
                    }
                }).catch(error => console.log('SW registration failed:', error));

                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        window.location.reload();
                        refreshing = true;
                    }
                });
            });
        }

        function showUpdateToast(worker) {
            const toast = document.getElementById('updateToast');
            const updateBtn = document.getElementById('updateAppBtn');

            toast.classList.add('show');

            // Use onclick to avoid adding multiple listeners if showUpdateToast is called repeatedly
            updateBtn.onclick = () => {
                updateBtn.disabled = true;
                worker.postMessage({ type: 'SKIP_WAITING' });
            };
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #d4e4e8 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #34495e;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .header small {
            color: #7f8c8d;
            font-size: 1rem;
        }

        .upload-area {
            background: white;
            border: 3px dashed #bdc3c7;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #3498db;
            background: #ecf0f1;
        }

        .upload-area.drag-over {
            border-color: #2ecc71;
            background: #d5f4e6;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .upload-area h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #34495e;
        }

        .upload-area p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-outline {
            background: white;
            color: #34495e;
            border: 2px solid #bdc3c7;
        }

        .btn-outline:hover {
            background: #ecf0f1;
            border-color: #95a5a6;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .app-content {
            display: none;
        }

        .app-content.active {
            display: block;
        }

        .deck-header {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .deck-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .deck-title h2 {
            font-size: 2rem;
            color: #34495e;
            margin-bottom: 5px;
        }

        .progress-info {
            color: #7f8c8d;
            font-size: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db 0%, #2ecc71 100%);
            transition: width 0.3s ease;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 20px;
        }

        .flashcard-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .flashcard {
            background: white;
            border-radius: 15px;
            padding: 60px 40px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .flashcard:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .flashcard-content {
            text-align: center;
            width: 100%;
        }

        .flashcard-text {
            font-size: 3rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .flashcard-label {
            color: #95a5a6;
            font-size: 1rem;
        }

        .side-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        @media (min-width: 640px) {
            .side-buttons {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .side-btn {
            padding: 12px 20px;
            border: 2px solid #bdc3c7;
            background: white;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #34495e;
        }

        .side-btn:hover {
            border-color: #3498db;
            background: #ecf0f1;
        }

        .side-btn.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .control-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .control-group .btn {
            flex: 1;
            min-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .icon-btn {
            width: 45px;
            padding: 12px;
        }

        .settings-panel {
            width: 100%;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .settings-header {
            font-size: 1.3rem;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .form-group select:focus {
            outline: none;
            border-color: #3498db;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-value {
            color: #7f8c8d;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ecf0f1;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            border: none;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #95a5a6;
        }

        .settings-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
            font-size: 0.85rem;
            color: #7f8c8d;
            line-height: 1.6;
        }

        #fileInput {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 767px) {
            .header h1 {
                font-size: 2rem;
            }

            .flashcard-text {
                font-size: 2rem;
            }

            .flashcard {
                padding: 40px 20px;
                min-height: 300px;
            }
        }

        /* Editor Styles */
        .editor-section {
            display: none;
        }

        .editor-section.active {
            display: block;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .editor-card-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .editor-card-item {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            border: 1px solid #ecf0f1;
            transition: all 0.2s;
        }

        .editor-card-item:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .editor-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .editor-card-title {
            font-weight: bold;
            color: #34495e;
        }

        .delete-btn {
            color: #e74c3c;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #fcebe9;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .editor-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .floating-add-btn {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .floating-add-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        /* Deck List Styles */
        .deck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .deck-item {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            border: 1px solid #ecf0f1;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 120px;
        }

        .deck-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: #3498db;
        }

        .deck-item-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .deck-item-info {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .deck-item-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .deck-item-btn {
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            border: 1px solid #bdc3c7;
            background: white;
            cursor: pointer;
        }

        .deck-item-btn:hover {
            background: #ecf0f1;
        }

        /* Update Toast */
        .update-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #34495e;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .update-toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .update-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .update-btn:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>日本語 Flashcards</h1>
            <p>Estude japonês com flashcards interativos</p>
            <small>versão 1.251130.1728</small>
        </div>

        <!-- Auth Section -->
        <div id="authSection">
            <div class="settings-panel" style="max-width: 400px; margin: 0 auto;">
                <div id="loginForm">
                    <div class="settings-header">Login</div>
                    <div class="form-group">
                        <label>Usuário</label>
                        <input type="text" id="loginUser" class="form-control"
                            style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 6px;">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="loginPass" class="form-control"
                            style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 6px;">
                    </div>
                    <button class="btn btn-primary" id="loginBtn" style="width: 100%;">Entrar</button>
                    <p style="margin-top: 15px; text-align: center;">
                        Não tem conta? <a href="#" id="toggleAuth">Registre-se</a>
                    </p>
                </div>

                <div id="registerForm" class="hidden">
                    <div class="settings-header">Registro</div>
                    <div class="form-group">
                        <label>Usuário</label>
                        <input type="text" id="regUser" class="form-control"
                            style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 6px;">
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="password" id="regPass" class="form-control"
                            style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 6px;">
                    </div>
                    <button class="btn btn-primary" id="registerBtn" style="width: 100%;">Registrar</button>
                    <p style="margin-top: 15px; text-align: center;">
                        Já tem conta? <a href="#" onclick="toggleAuthMode()">Faça Login</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- App Section -->
        <div id="appSection" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span id="welcomeUser" style="font-weight: bold; color: #34495e;"></span>
                <button id="logoutBtn" class="btn btn-outline"
                    style="padding: 5px 10px; font-size: 0.9rem;">Sair</button>
            </div>

            <!-- Deck List State -->
            <div id="deckListArea">
                <div class="deck-list-header"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="font-size: 1.5rem; color: #34495e;">Meus Decks</h2>
                    <button class="btn btn-primary" id="createNewDeckBtn">✨ Novo Deck</button>
                </div>
                <div id="deckList" class="deck-grid">
                    <!-- Decks will be injected here -->
                </div>
            </div>

            <!-- App Content (Flashcards) -->
            <div id="appContent" class="app-content">
                <div class="deck-header">
                    <div class="deck-title">
                        <h2 id="deckTitle"></h2>
                        <div class="progress-info">
                            <span id="progressText">Card 1 de 1</span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                    <div class="deck-actions">
                        <button class="btn btn-outline" id="editDeckBtn">✏️ Editar Deck</button>
                        <button class="btn btn-outline" id="newDeckBtn">📤 Voltar para Decks</button>
                        <button class="btn btn-outline" id="shuffleBtn">🔀 Misturar</button>
                        <button class="btn btn-outline" id="restartBtn">↻ Reiniciar</button>
                    </div>
                </div>

                <div class="main-content">
                    <div class="flashcard-section">
                        <div class="flashcard">
                            <div class="flashcard-content">
                                <div class="flashcard-text" id="cardText"></div>
                                <div class="flashcard-label" id="cardLabel"></div>
                            </div>
                        </div>

                        <div class="side-buttons">
                            <button class="side-btn active" data-side="1">Lado 1</button>
                            <button class="side-btn" data-side="2">Lado 2</button>
                            <button class="side-btn" data-side="3">Lado 3</button>
                            <button class="side-btn" data-side="4">Lado 4</button>
                        </div>

                        <div class="controls">
                            <div class="control-group">
                                <button class="btn btn-outline" id="prevBtn">
                                    ← Anterior
                                </button>
                                <button class="btn btn-outline" id="nextBtn">
                                    Próximo →
                                </button>
                                <button class="btn btn-outline" id="ttsBtn">
                                    🔊 Ouvir
                                </button>
                            </div>
                        </div>

                        <!-- TTS Settings -->
                        <div class="settings-panel" style="margin-top: 20px;">
                            <div class="settings-header">Configurações de Voz</div>
                            <div class="form-group">
                                <label>Voz</label>
                                <select id="voiceSelect"></select>
                            </div>
                            <div class="slider-container">
                                <div class="slider-header">
                                    <label>Velocidade</label>
                                    <span id="rateValue" class="slider-value">1x</span>
                                </div>
                                <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
                                <div class="slider-labels">
                                    <span>Lento</span>
                                    <span>Rápido</span>
                                </div>
                            </div>
                            <div class="slider-container" style="margin-top: 15px;">
                                <div class="slider-header">
                                    <label>Tom</label>
                                    <span id="pitchValue" class="slider-value">1</span>
                                </div>
                                <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
                                <div class="slider-labels">
                                    <span>Grave</span>
                                    <span>Agudo</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Editor Section -->
            <div id="editorSection" class="editor-section">
                <div class="editor-header">
                    <h2>Editar Deck</h2>
                    <div class="input-group" style="margin-bottom: 0; flex-grow: 1; max-width: 300px;">
                        <input type="text" id="editDeckTitle" placeholder="Nome do Deck">
                    </div>
                </div>
                <div id="editorCardList" class="editor-card-list">
                    <!-- Cards injected here -->
                </div>
                <button id="addCardBtn" class="floating-add-btn">+ Adicionar Card</button>
                <div class="editor-controls">
                    <button id="saveDeckBtn" class="btn btn-primary" style="flex: 1;">Salvar Alterações</button>
                    <button id="cancelEditBtn" class="btn btn-secondary" style="flex: 1;">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
