<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語 Flashcards - Estudo de Japonês (Mockup)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #d4e4e8 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #34495e;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .header small {
            color: #7f8c8d;
            font-size: 1rem;
        }

        .upload-area {
            background: white;
            border: 3px dashed #bdc3c7;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #3498db;
            background: #ecf0f1;
        }

        .upload-area.drag-over {
            border-color: #2ecc71;
            background: #d5f4e6;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .upload-area h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #34495e;
        }

        .upload-area p {
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-outline {
            background: white;
            color: #34495e;
            border: 2px solid #bdc3c7;
        }

        .btn-outline:hover {
            background: #ecf0f1;
            border-color: #95a5a6;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .app-content {
            display: none;
        }

        .app-content.active {
            display: block;
        }

        .deck-header {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .deck-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .deck-title h2 {
            font-size: 2rem;
            color: #34495e;
            margin-bottom: 5px;
        }

        .progress-info {
            color: #7f8c8d;
            font-size: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db 0%, #2ecc71 100%);
            transition: width 0.3s ease;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 20px;
        }

        .flashcard-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .flashcard {
            background: white;
            border-radius: 15px;
            padding: 60px 40px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .flashcard:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .flashcard-content {
            text-align: center;
            width: 100%;
        }

        .flashcard-text {
            font-size: 3rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .flashcard-label {
            color: #95a5a6;
            font-size: 1rem;
        }

        .side-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        @media (min-width: 640px) {
            .side-buttons {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .side-btn {
            padding: 12px 20px;
            border: 2px solid #bdc3c7;
            background: white;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #34495e;
        }

        .side-btn:hover {
            border-color: #3498db;
            background: #ecf0f1;
        }

        .side-btn.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .control-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .control-group .btn {
            flex: 1;
            min-width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .icon-btn {
            width: 45px;
            padding: 12px;
        }

        .settings-panel {
            width: 100%;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .settings-header {
            font-size: 1.3rem;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .form-group select:focus {
            outline: none;
            border-color: #3498db;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-value {
            color: #7f8c8d;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ecf0f1;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            border: none;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #95a5a6;
        }

        .settings-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ecf0f1;
            font-size: 0.85rem;
            color: #7f8c8d;
            line-height: 1.6;
        }

        #fileInput {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 767px) {
            .header h1 {
                font-size: 2rem;
            }

            .flashcard-text {
                font-size: 2rem;
            }

            .flashcard {
                padding: 40px 20px;
                min-height: 300px;
            }
        }

        /* Editor Styles */
        .editor-section {
            display: none;
        }

        .editor-section.active {
            display: block;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .editor-card-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .editor-card-item {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            border: 1px solid #ecf0f1;
            transition: all 0.2s;
        }

        .editor-card-item:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .editor-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .editor-card-title {
            font-weight: bold;
            color: #34495e;
        }

        .delete-btn {
            color: #e74c3c;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .delete-btn:hover {
            background: #fcebe9;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3498db;
        }

        .editor-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .floating-add-btn {
            width: 100%;
            padding: 15px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .floating-add-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        /* Deck List Styles */
        .deck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .deck-item {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            border: 1px solid #ecf0f1;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 120px;
        }

        .deck-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: #3498db;
        }

        .deck-item-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .deck-item-info {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .deck-item-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .deck-item-btn {
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            border: 1px solid #bdc3c7;
            background: white;
            cursor: pointer;
        }

        .deck-item-btn:hover {
            background: #ecf0f1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>日本語 Flashcards</h1>
            <small>versão 1.251202.1514 (Mockup - Dados Estáticos)</small>
        </div>

        <!-- App Section -->
        <div id="appSection">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span id="welcomeUser" style="font-weight: bold; color: #34495e;">Olá, Usuário Demo</span>
                <button id="logoutBtn" class="btn btn-outline"
                    style="padding: 5px 10px; font-size: 0.9rem;">Sair</button>
            </div>

            <!-- Deck List State -->
            <div id="deckListArea">
                <div class="deck-list-header"
                    style="display: flex; justify-content: flex-start; align-items: center; margin-bottom: 20px;">
                    <h2 style="font-size: 1.5rem; color: #34495e;">Meus Decks</h2>
                    <button class="btn btn-primary" id="createNewDeckBtn" style="margin-left: 10px">✨ Novo Deck</button>
                    <button class="btn btn-secondary" id="importDeckBtn" style="margin-left: 10px">📥 Importar</button>
                </div>
                <div id="deckList" class="deck-grid">
                    <!-- Decks will be injected here -->
                </div>
            </div>

            <!-- App Content (Flashcards) -->
            <div id="appContent" class="app-content">
                <div class="deck-header">
                    <div class="deck-title">
                        <h2 id="deckTitle"></h2>
                        <div class="progress-info">
                            <span id="progressText">Card 1 de 1</span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                    <div class="deck-actions">
                        <button class="btn btn-outline" id="editDeckBtn">✏️ Editar Deck</button>
                        <button class="btn btn-outline" id="newDeckBtn">📤 Voltar para Decks</button>
                        <button class="btn btn-outline" id="shuffleBtn">🔀 Misturar</button>
                        <button class="btn btn-outline" id="restartBtn">↻ Reiniciar</button>
                    </div>
                </div>

                <div class="main-content">
                    <div class="flashcard-section">
                        <div class="flashcard">
                            <div class="flashcard-content">
                                <div class="flashcard-text" id="cardText"></div>
                                <div class="flashcard-label" id="cardLabel"></div>
                            </div>
                        </div>

                        <div class="side-buttons">
                            <button class="side-btn active" data-side="1">Kanji</button>
                            <button class="side-btn" data-side="2">Hiragana</button>
                            <button class="side-btn" data-side="3">Rōmaji</button>
                            <button class="side-btn" data-side="4">Português</button>
                        </div>

                        <div class="controls">
                            <div class="control-group">
                                <button class="btn btn-outline" id="prevBtn">
                                    ← Anterior
                                </button>
                                <button class="btn btn-outline" id="nextBtn">
                                    Próximo →
                                </button>
                                <button class="btn btn-outline" id="ttsBtn">
                                    🔊 Ouvir
                                </button>
                            </div>
                        </div>

                        <!-- TTS Settings -->
                        <div class="settings-panel" style="margin-top: 20px;">
                            <div class="settings-header">Configurações de Voz</div>
                            <div class="form-group">
                                <label>Voz</label>
                                <select id="voiceSelect"></select>
                            </div>
                            <div class="slider-container">
                                <div class="slider-header">
                                    <label>Velocidade</label>
                                    <span id="rateValue" class="slider-value">1x</span>
                                </div>
                                <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
                                <div class="slider-labels">
                                    <span>Lento</span>
                                    <span>Rápido</span>
                                </div>
                            </div>
                            <div class="slider-container" style="margin-top: 15px;">
                                <div class="slider-header">
                                    <label>Tom</label>
                                    <span id="pitchValue" class="slider-value">1</span>
                                </div>
                                <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
                                <div class="slider-labels">
                                    <span>Grave</span>
                                    <span>Agudo</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Editor Section -->
            <div id="editorSection" class="editor-section">
                <div class="editor-header">
                    <h2>Editar Deck</h2>
                    <div class="input-group" style="margin-bottom: 0; flex-grow: 1; max-width: 300px;">
                        <input type="text" id="editDeckTitle" placeholder="Nome do Deck">
                    </div>
                </div>
                <div id="editorCardList" class="editor-card-list">
                    <!-- Cards injected here -->
                </div>
                <button id="addCardBtn" class="floating-add-btn">+ Adicionar Card</button>
                <div class="editor-controls">
                    <button id="saveDeckBtn" class="btn btn-primary" style="flex: 1;">Salvar Alterações</button>
                    <button id="cancelEditBtn" class="btn btn-secondary" style="flex: 1;">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // STATIC MOCKUP DATA - No backend connections
        const MOCK_DECKS = [
            {
                id: 1,
                title: "Números em Japonês",
                cards: [
                    { side1: "一", side2: "いち", side3: "ichi", side4: "Um" },
                    { side1: "二", side2: "に", side3: "ni", side4: "Dois" },
                    { side1: "三", side2: "さん", side3: "san", side4: "Três" },
                    { side1: "四", side2: "し/よん", side3: "shi/yon", side4: "Quatro" },
                    { side1: "五", side2: "ご", side3: "go", side4: "Cinco" }
                ]
            },
            {
                id: 2,
                title: "Saudações Básicas",
                cards: [
                    { side1: "おはよう", side2: "おはよう", side3: "ohayou", side4: "Bom dia" },
                    { side1: "こんにちは", side2: "こんにちは", side3: "konnichiwa", side4: "Boa tarde" },
                    { side1: "こんばんは", side2: "こんばんは", side3: "konbanwa", side4: "Boa noite" },
                    { side1: "ありがとう", side2: "ありがとう", side3: "arigatou", side4: "Obrigado" },
                    { side1: "さようなら", side2: "さようなら", side3: "sayounara", side4: "Adeus" }
                ]
            },
            {
                id: 3,
                title: "Cores",
                cards: [
                    { side1: "赤", side2: "あか", side3: "aka", side4: "Vermelho" },
                    { side1: "青", side2: "あお", side3: "ao", side4: "Azul" },
                    { side1: "黄色", side2: "きいろ", side3: "kiiro", side4: "Amarelo" },
                    { side1: "緑", side2: "みどり", side3: "midori", side4: "Verde" },
                    { side1: "黒", side2: "くろ", side3: "kuro", side4: "Preto" },
                    { side1: "白", side2: "しろ", side3: "shiro", side4: "Branco" }
                ]
            },
            {
                id: 4,
                title: "Dias da Semana",
                cards: [
                    { side1: "月曜日", side2: "げつようび", side3: "getsuyoubi", side4: "Segunda-feira" },
                    { side1: "火曜日", side2: "かようび", side3: "kayoubi", side4: "Terça-feira" },
                    { side1: "水曜日", side2: "すいようび", side3: "suiyoubi", side4: "Quarta-feira" },
                    { side1: "木曜日", side2: "もくようび", side3: "mokuyoubi", side4: "Quinta-feira" },
                    { side1: "金曜日", side2: "きんようび", side3: "kinyoubi", side4: "Sexta-feira" }
                ]
            }
        ];

        const state = {
            user: { id: 1, username: "Usuário Demo" },
            decks: [...MOCK_DECKS],
            currentDeck: null,
            currentCardIndex: 0,
            isFlipped: false
        };

        // DOM Elements
        const deckListArea = document.getElementById('deckListArea');
        const appContent = document.getElementById('appContent');
        const deckList = document.getElementById('deckList');

        // UI Functions
        function showDeckList() {
            deckListArea.classList.remove('hidden');
            appContent.classList.remove('active');
            if (document.getElementById('editorSection')) document.getElementById('editorSection').classList.remove('active');
            renderDeckList();
        }

        function showFlashcards() {
            deckListArea.classList.add('hidden');
            appContent.classList.add('active');
            renderCard();
            updateProgress();
        }

        function renderDeckList() {
            deckList.innerHTML = '';
            state.decks.forEach(deck => {
                const div = document.createElement('div');
                div.className = 'deck-item';
                div.innerHTML = `
                    <div class="deck-item-title">${deck.title}</div>
                    <div class="deck-item-info">${deck.cards.length} cards</div>
                    <div class="deck-item-actions">
                        <button class="deck-item-btn" onclick="openDeck(${deck.id})">Abrir</button>
                        <button class="deck-item-btn" onclick="exportDeck(${deck.id})">Exportar</button>
                        <button class="deck-item-btn" onclick="deleteDeck(${deck.id})" style="color:red; border-color:red;">Excluir</button>
                    </div>
                `;
                deckList.appendChild(div);
            });
        }

        function renderCard() {
            if (!state.currentDeck || !state.currentDeck.cards || state.currentDeck.cards.length === 0) {
                document.getElementById('cardText').textContent = "Deck vazio";
                return;
            }
            const card = state.currentDeck.cards[state.currentCardIndex];

            // Default
            document.getElementById('cardText').textContent = card.side1;
            document.getElementById('cardLabel').textContent = ""; // Side 1
            document.getElementById('deckTitle').textContent = state.currentDeck.title;

            // Reset active side button
            document.querySelectorAll('.side-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.side-btn[data-side="1"]').classList.add('active');
        }

        function updateProgress() {
            if (!state.currentDeck || !state.currentDeck.cards) return;
            const total = state.currentDeck.cards.length;
            const current = state.currentCardIndex + 1;
            const percent = (current / total) * 100;

            document.getElementById('progressText').textContent = `Card ${current} de ${total}`;
            document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        // Deck Functions
        window.openDeck = (id) => {
            const deck = state.decks.find(d => d.id === id);
            if (deck) {
                state.currentDeck = JSON.parse(JSON.stringify(deck)); // Deep copy
                state.currentCardIndex = 0;
                state.isFlipped = false;
                showFlashcards();
            }
        };

        window.deleteDeck = (id) => {
            if (!confirm('Tem certeza que deseja excluir este deck?')) return;
            state.decks = state.decks.filter(d => d.id !== id);
            renderDeckList();
            alert('Deck excluído com sucesso! (Mockup - não persistido)');
        };

        window.exportDeck = (id) => {
            const deck = state.decks.find(d => d.id === id);
            if (deck) {
                const exportData = {
                    title: deck.title,
                    cards: deck.cards.map(card => ({
                        side1: card.side1,
                        side2: card.side2,
                        side3: card.side3,
                        side4: card.side4
                    }))
                };

                const blob = new Blob([JSON.stringify(exportData, null, 4)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${deck.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        };

        // Event Listeners
        document.getElementById('logoutBtn').addEventListener('click', () => {
            alert('Logout (Mockup - sem ação real)');
        });

        document.getElementById('createNewDeckBtn').addEventListener('click', () => {
            const title = prompt("Nome do novo deck:");
            if (title) {
                const newDeck = {
                    id: Math.max(...state.decks.map(d => d.id)) + 1,
                    title: title,
                    cards: []
                };
                state.decks.push(newDeck);
                renderDeckList();
                alert('Deck criado com sucesso! (Mockup - não persistido)');
            }
        });

        document.getElementById('importDeckBtn').addEventListener('click', () => {
            alert('Função de importação (Mockup - não implementada)');
        });

        // Navigation
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (state.currentDeck && state.currentCardIndex < state.currentDeck.cards.length - 1) {
                state.currentCardIndex++;
                renderCard();
                updateProgress();
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (state.currentDeck && state.currentCardIndex > 0) {
                state.currentCardIndex--;
                renderCard();
                updateProgress();
            }
        });

        document.getElementById('newDeckBtn').addEventListener('click', () => {
            appContent.classList.remove('active');
            deckListArea.classList.remove('hidden');
        });

        // Side buttons
        document.querySelectorAll('.side-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const side = e.target.dataset.side;
                const card = state.currentDeck.cards[state.currentCardIndex];
                document.getElementById('cardText').textContent = card[`side${side}`];

                document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            });
        });

        // Deck Actions
        const shuffleBtn = document.getElementById('shuffleBtn');
        const restartBtn = document.getElementById('restartBtn');
        const ttsBtn = document.getElementById('ttsBtn');
        const editDeckBtn = document.getElementById('editDeckBtn');

        if (shuffleBtn) {
            shuffleBtn.addEventListener('click', () => {
                if (!state.currentDeck || !state.currentDeck.cards) return;
                for (let i = state.currentDeck.cards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [state.currentDeck.cards[i], state.currentDeck.cards[j]] = [state.currentDeck.cards[j], state.currentDeck.cards[i]];
                }
                state.currentCardIndex = 0;
                renderCard();
                updateProgress();
            });
        }

        if (restartBtn) {
            restartBtn.addEventListener('click', () => {
                state.currentCardIndex = 0;
                renderCard();
                updateProgress();
            });
        }

        // TTS
        let voices = [];
        const voiceSelect = document.getElementById('voiceSelect');
        const rateInput = document.getElementById('rate');
        const pitchInput = document.getElementById('pitch');
        const rateValue = document.getElementById('rateValue');
        const pitchValue = document.getElementById('pitchValue');

        function isJapaneseVoice(voice) {
            return voice && voice.lang && voice.lang.toLowerCase().startsWith('ja');
        }

        function loadVoices() {
            voices = speechSynthesis.getVoices() || [];
            if (!voiceSelect) return;
            voiceSelect.innerHTML = '';

            // Prioritize Japanese voices; if none, list all voices as fallback
            const jap = voices.filter(isJapaneseVoice);
            const list = jap.length ? jap : voices;

            list.forEach((voice) => {
                const option = document.createElement('option');
                // store the index from the global voices array so selection maps correctly
                option.value = voices.indexOf(voice);
                option.textContent = `${voice.name} (${voice.lang})`;
                voiceSelect.appendChild(option);
            });

            if (voiceSelect.options.length) voiceSelect.selectedIndex = 0;
        }

        speechSynthesis.onvoiceschanged = loadVoices;
        // attempt initial load; on many Android devices this will populate only after user interaction
        setTimeout(loadVoices, 0);

        if (ttsBtn) {
            ttsBtn.addEventListener('click', async () => {
                const card = state.currentDeck.cards[state.currentCardIndex];
                const text = card.side1;

                if (!text) return;

                // ensure voices are loaded after this user gesture
                if (!voices.length) {
                    loadVoices();
                    // small delay to allow the browser to populate voices list
                    await new Promise(r => setTimeout(r, 200));
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';

                utterance.rate = parseFloat(rateInput?.value || 1);
                utterance.pitch = parseFloat(pitchInput?.value || 1);

                // Determine selected voice from select element (value is global index)
                let selectedVoice = null;
                if (voiceSelect && voiceSelect.value) {
                    const idx = parseInt(voiceSelect.value, 10);
                    if (!Number.isNaN(idx) && voices[idx]) selectedVoice = voices[idx];
                }

                // Fallback: pick first Japanese voice, otherwise first available
                if (!selectedVoice) selectedVoice = voices.find(isJapaneseVoice) || voices[0] || null;
                if (selectedVoice) utterance.voice = selectedVoice;

                utterance.onstart = () => console.log('TTS started', utterance.voice && utterance.voice.name);
                utterance.onerror = (e) => console.error('TTS error', e);
                utterance.onend = () => console.log('TTS ended');

                try { speechSynthesis.cancel(); } catch (e) { }
                speechSynthesis.speak(utterance);
            });
        }

        if (rateInput) rateInput.addEventListener('input', () => rateValue.textContent = rateInput.value + 'x');
        if (pitchInput) pitchInput.addEventListener('input', () => pitchValue.textContent = pitchInput.value);

        // --- Editor Logic ---
        const editorSection = document.getElementById('editorSection');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const saveDeckBtn = document.getElementById('saveDeckBtn');
        const addCardBtn = document.getElementById('addCardBtn');
        const editorCardList = document.getElementById('editorCardList');
        const editDeckTitle = document.getElementById('editDeckTitle');

        if (editDeckBtn) {
            editDeckBtn.addEventListener('click', showEditor);
        }

        function showEditor() {
            appContent.classList.remove('active');
            editorSection.classList.add('active');

            editDeckTitle.value = state.currentDeck.title;
            renderEditorCards();
        }

        if (cancelEditBtn) {
            cancelEditBtn.addEventListener('click', () => {
                editorSection.classList.remove('active');
                appContent.classList.add('active');
            });
        }

        function renderEditorCards() {
            editorCardList.innerHTML = '';
            state.currentDeck.cards.forEach((card, index) => {
                const cardItem = document.createElement('div');
                cardItem.className = 'editor-card-item';
                cardItem.innerHTML = `
                <div class="editor-card-header">
                    <span class="editor-card-title">Card ${index + 1}</span>
                    <button class="delete-btn" onclick="deleteCard(${index})">🗑️</button>
                </div>
                <div class="input-group">
                    <label>Lado 1 (Kanji/Principal)</label>
                    <input type="text" value="${card.side1 || ''}" onchange="updateCardData(${index}, 'side1', this.value)">
                </div>
                <div class="input-group">
                    <label>Lado 2 (Hiragana/Leitura)</label>
                    <input type="text" value="${card.side2 || ''}" onchange="updateCardData(${index}, 'side2', this.value)">
                </div>
                <div class="input-group">
                    <label>Lado 3 (Romaji)</label>
                    <input type="text" value="${card.side3 || ''}" onchange="updateCardData(${index}, 'side3', this.value)">
                </div>
                <div class="input-group">
                    <label>Lado 4 (Tradução)</label>
                    <input type="text" value="${card.side4 || ''}" onchange="updateCardData(${index}, 'side4', this.value)">
                </div>
            `;
                editorCardList.appendChild(cardItem);
            });
        }

        // Global functions for inline onclicks
        window.deleteCard = (index) => {
            if (confirm('Excluir este card?')) {
                state.currentDeck.cards.splice(index, 1);
                renderEditorCards();
            }
        };

        window.updateCardData = (index, field, value) => {
            state.currentDeck.cards[index][field] = value;
        };

        if (addCardBtn) {
            addCardBtn.addEventListener('click', () => {
                state.currentDeck.cards.push({
                    side1: '',
                    side2: '',
                    side3: '',
                    side4: ''
                });
                renderEditorCards();
                setTimeout(() => {
                    editorCardList.scrollTop = editorCardList.scrollHeight;
                }, 100);
            });
        }

        if (saveDeckBtn) {
            saveDeckBtn.addEventListener('click', () => {
                const newTitle = editDeckTitle.value;
                state.currentDeck.title = newTitle;

                // Update in the decks array
                const deckIndex = state.decks.findIndex(d => d.id === state.currentDeck.id);
                if (deckIndex !== -1) {
                    state.decks[deckIndex] = JSON.parse(JSON.stringify(state.currentDeck));
                }

                alert('Deck salvo com sucesso! (Mockup - não persistido)');

                editorSection.classList.remove('active');
                appContent.classList.add('active');

                document.getElementById('deckTitle').textContent = newTitle;
                renderCard();
            });
        }

        // Initialize
        showDeckList();
    </script>

</body>

</html>
